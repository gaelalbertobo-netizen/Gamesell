<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameKeys — Keys al mejor precio</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810;
      --bg2: #0f0f1a;
      --bg3: #15151f;
      --border: #1e1e2e;
      --purple: #7c3aed;
      --purple2: #a78bfa;
      --green: #4ade80;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── AUTH ── */
    #auth {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 60% 40%, #1a0a2e 0%, var(--bg) 70%);
    }

    .tarjeta {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(124,58,237,0.12);
    }

    .logo-auth {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-auth .brand {
      font-family: 'Rajdhani', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    .logo-auth .brand span { color: var(--purple2); }
    .logo-auth p { color: var(--muted); font-size: 13px; margin-top: 6px; }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 9px;
      background: none;
      border: none;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab.activo {
      background: var(--purple);
      color: #fff;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--purple); }

    .btn-principal {
      width: 100%;
      padding: 13px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .btn-principal:hover { background: #6d28d9; transform: translateY(-1px); }

    .mensaje {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .ok { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .error { background: #2d0a0a; color: #f87171; border: 1px solid #7f1d1d; }

    /* ── TIENDA ── */
    #tienda { display: none; }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: rgba(8,8,16,0.95);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
    }

    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .logo span { color: var(--purple2); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-user {
      font-size: 13px;
      color: var(--muted);
    }

    /* Carrito botón nav */
    .btn-carrito-nav {
      position: relative;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.2s;
    }

    .btn-carrito-nav:hover { border-color: var(--purple); }

    .carrito-badge {
      background: var(--purple);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-salir {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .btn-salir:hover { border-color: #f87171; color: #f87171; }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, #0f0820 0%, var(--bg) 60%);
      padding: 60px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    .hero h2 span { color: var(--purple2); }
    .hero p { color: var(--muted); font-size: 16px; }

    /* Sección */
    .seccion {
      padding: 40px 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .seccion h3 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      color: #fff;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* Grid juegos */
    .juegos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .juego {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.2s;
      cursor: pointer;
    }

    .juego:hover {
      border-color: var(--purple);
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(124,58,237,0.2);
    }

    .juego-img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .juego-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .juego-info { padding: 14px; }
    .juego-nombre { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .juego-plataforma { font-size: 11px; color: var(--muted); margin-bottom: 10px; }

    .juego-precios {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .precio-original { font-size: 11px; color: var(--muted); text-decoration: line-through; }
    .precio-nuevo { font-size: 17px; font-weight: 700; color: var(--green); }
    .descuento {
      background: var(--purple);
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
    }

    .btn-agregar {
      width: 100%;
      padding: 8px;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-agregar:hover { background: var(--purple); border-color: var(--purple); color: #fff; }
    .btn-agregar.agregado { background: var(--green); border-color: var(--green); color: #000; }

    /* ── CARRITO PANEL ── */
    .carrito-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      backdrop-filter: blur(4px);
    }

    .carrito-overlay.abierto { display: block; }

    .carrito-panel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 400px;
      height: 100vh;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      z-index: 201;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .carrito-panel.abierto { right: 0; }

    .carrito-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .carrito-header h3 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px;
      color: #fff;
    }

    .btn-cerrar-carrito {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s;
    }

    .btn-cerrar-carrito:hover { color: #fff; }

    .carrito-items {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .carrito-vacio {
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 14px;
    }

    .carrito-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .carrito-item-emoji { font-size: 28px; }

    .carrito-item-info { flex: 1; }
    .carrito-item-nombre { font-size: 13px; font-weight: 600; color: #fff; }
    .carrito-item-plat { font-size: 11px; color: var(--muted); }

    .carrito-item-precio {
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
    }

    .btn-quitar {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .btn-quitar:hover { color: #f87171; }

    .carrito-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
    }

    .carrito-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .carrito-total span:first-child { color: var(--muted); font-size: 14px; }
    .carrito-total span:last-child { font-size: 22px; font-weight: 700; color: var(--green); font-family: 'Rajdhani', sans-serif; }

    .btn-pagar {
      width: 100%;
      padding: 14px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.5px;
    }

    .btn-pagar:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn-pagar:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

    /* ── MODAL KEY ── */
    .modal-fondo {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 300;
      justify-content: center;
      align-items: center;
    }

    .modal-fondo.abierto { display: flex; }

    .modal {
      background: var(--bg2);
      border-radius: 20px;
      padding: 36px;
      max-width: 400px;
      width: 90%;
      border: 1px solid var(--purple);
      text-align: center;
      box-shadow: 0 0 60px rgba(124,58,237,0.3);
    }

    .modal h3 { font-family: 'Rajdhani', sans-serif; font-size: 24px; color: #fff; margin-bottom: 8px; }
    .modal p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

    .key-box {
      background: var(--bg);
      border: 1px dashed var(--purple);
      border-radius: 10px;
      padding: 18px;
      font-family: monospace;
      font-size: 20px;
      color: var(--purple2);
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    .modal-btns { display: flex; gap: 10px; justify-content: center; }

    .btn-copiar {
      padding: 10px 24px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-copiar:hover { background: #6d28d9; }

    .btn-cerrar-modal {
      padding: 10px 24px;
      background: var(--bg3);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-cerrar-modal:hover { color: #fff; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth">
  <div class="tarjeta">
    <div class="logo-auth">
      <div class="brand">🎮 Game<span>Keys</span></div>
      <p>Keys de videojuegos al mejor precio</p>
    </div>
    <div class="tabs">
      <button class="tab activo" onclick="mostrarTab('registro')">Crear cuenta</button>
      <button class="tab" onclick="mostrarTab('login')">Iniciar sesión</button>
    </div>
    <div id="form-registro">
      <input id="reg-nombre" type="text" placeholder="Tu nombre">
      <input id="reg-email" type="email" placeholder="Tu email">
      <input id="reg-pass" type="password" placeholder="Contraseña (mín. 6 caracteres)">
      <button class="btn-principal" onclick="registrar()">Crear cuenta gratis</button>
    </div>
    <div id="form-login" style="display:none">
      <input id="log-email" type="email" placeholder="Tu email">
      <input id="log-pass" type="password" placeholder="Tu contraseña">
      <button class="btn-principal" onclick="login()">Entrar a la tienda</button>
    </div>
    <div class="mensaje" id="mensaje"></div>
  </div>
</div>

<!-- ── TIENDA ── -->
<div id="tienda">
  <nav>
    <div class="logo">🎮 Game<span>Keys</span></div>
    <div class="nav-right">
      <span class="nav-user" id="nav-nombre"></span>
      <button class="btn-carrito-nav" onclick="abrirCarrito()">
        🛒 Carrito
        <span class="carrito-badge" id="carrito-count">0</span>
      </button>
      <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
    </div>
  </nav>

  <div class="hero">
    <h2>Keys de videojuegos <span>hasta 88% off</span></h2>
    <p>Activa tu juego al instante en Steam, Epic Games y más</p>
  </div>

  <div class="seccion">
    <h3>🔥 Ofertas destacadas</h3>
    <div class="juegos" id="lista-juegos"></div>
  </div>
</div>

<!-- ── CARRITO PANEL ── -->
<div class="carrito-overlay" id="carrito-overlay" onclick="cerrarCarrito()"></div>
<div class="carrito-panel" id="carrito-panel">
  <div class="carrito-header">
    <h3>🛒 Tu carrito</h3>
    <button class="btn-cerrar-carrito" onclick="cerrarCarrito()">✕</button>
  </div>
  <div class="carrito-items" id="carrito-items">
    <div class="carrito-vacio">Tu carrito está vacío 😢</div>
  </div>
  <div class="carrito-footer">
    <div class="carrito-total">
      <span>Total</span>
      <span id="carrito-total">$0.00</span>
    </div>
    <button class="btn-pagar" id="btn-pagar" onclick="pagar()" disabled>
      💳 Pagar con Stripe
    </button>
  </div>
</div>

<!-- ── MODAL KEY ── -->
<div class="modal-fondo" id="modal">
  <div class="modal">
    <h3>🎉 ¡Tu key está lista!</h3>
    <p id="modal-juego">Cyberpunk 2077 — Steam</p>
    <div class="key-box" id="modal-key">XXXX-XXXX-XXXX-XXXX</div>
    <div class="modal-btns">
      <button class="btn-copiar" onclick="copiarKey()">📋 Copiar key</button>
      <button class="btn-cerrar-modal" onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
  const juegos = [
    { nombre: "Cyberpunk 2077", plataforma: "Steam", img: "https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/36407bf0-7675-4fc7-953d-91ab3af07156/debwpo6-883d3fab-7062-4491-8f2e-54544d459e43.jpg/v1/fill/w_1192,h_670,q_70,strp/cyberpunk_2077_cover_art__red_version__by_l4chun_debwpo6-pre.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9NDAwMCIsInBhdGgiOiJcL2ZcLzM2NDA3YmYwLTc2NzUtNGZjNy05NTNkLTkxYWIzYWYwNzE1NlwvZGVid3BvNi04ODNkM2ZhYi03MDYyLTQ0OTEtOGYyZS01NDU0NGQ0NTllNDMuanBnIiwid2lkdGgiOiI8PTcxMTEifV1dLCJhdWQiOlsidXJuOnNlcnZpY2U6aW1hZ2Uub3BlcmF0aW9ucyJdfQ.Ug8u_jg4z4zdzznbbzJFai9ZsbUIPl263n3mJVwFP5k.jpg", original: 59.99, precio: 5.99, descuento: 78, emoji: "🤖" },
    { nombre: "Elden Ring", plataforma: "Steam", emoji: "⚔️", original: 59.99, precio: 29.99, descuento: 50 },
    { nombre: "Red Dead Redemption 2", plataforma: "Steam", emoji: "🤠", original: 69.99, precio: 19.99, descuento: 67 },
    { nombre: "Hogwarts Legacy", plataforma: "Steam", emoji: "🧙", original: 59.99, precio: 24.99, descuento: 58 },
    { nombre: "FIFA 24", plataforma: "EA App", emoji: "⚽", original: 69.99, precio: 14.99, descuento: 79 },
    { nombre: "Minecraft", plataforma: "Microsoft", emoji: "⛏️", original: 26.99, precio: 9.99, descuento: 63 },
    { nombre: "The Witcher 3", plataforma: "GOG", emoji: "🐺", original: 39.99, precio: 4.99, descuento: 88 },
  ];

  let carrito = [];

  // ── CARRITO ──
  function agregarAlCarrito(i) {
    const juego = juegos[i];
    const existe = carrito.find(c => c.nombre === juego.nombre);
    if (existe) return;
    carrito.push({ ...juego, cantidad: 1 });
    actualizarCarrito();
    const btn = document.querySelectorAll('.btn-agregar')[i];
    btn.textContent = '✅ Agregado';
    btn.classList.add('agregado');
  }

  function quitarDelCarrito(nombre) {
    carrito = carrito.filter(c => c.nombre !== nombre);
    actualizarCarrito();
    cargarJuegos();
  }

  function actualizarCarrito() {
    const count = carrito.length;
    document.getElementById('carrito-count').textContent = count;

    const total = carrito.reduce((sum, c) => sum + c.precio * c.cantidad, 0);
    document.getElementById('carrito-total').textContent = '$' + total.toFixed(2);

    const btnPagar = document.getElementById('btn-pagar');
    btnPagar.disabled = count === 0;

    const itemsEl = document.getElementById('carrito-items');
    if (count === 0) {
      itemsEl.innerHTML = '<div class="carrito-vacio">Tu carrito está vacío 😢</div>';
      return;
    }

    itemsEl.innerHTML = carrito.map(c => `
      <div class="carrito-item">
        <div class="carrito-item-emoji">${c.emoji || '🎮'}</div>
        <div class="carrito-item-info">
          <div class="carrito-item-nombre">${c.nombre}</div>
          <div class="carrito-item-plat">${c.plataforma}</div>
        </div>
        <div class="carrito-item-precio">$${c.precio}</div>
        <button class="btn-quitar" onclick="quitarDelCarrito('${c.nombre}')">✕</button>
      </div>
    `).join('');
  }

  function abrirCarrito() {
    document.getElementById('carrito-overlay').classList.add('abierto');
    document.getElementById('carrito-panel').classList.add('abierto');
  }

  function cerrarCarrito() {
    document.getElementById('carrito-overlay').classList.remove('abierto');
    document.getElementById('carrito-panel').classList.remove('abierto');
  }

  // ── STRIPE PAGO ──
  async function pagar() {
    const btn = document.getElementById('btn-pagar');
    btn.disabled = true;
    btn.textContent = '⏳ Redirigiendo...';

    try {
      const res = await fetch('/api/shop/crear-sesion', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + localStorage.getItem('token')
        },
        body: JSON.stringify({ items: carrito })
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        alert('Error al crear sesión de pago');
        btn.disabled = false;
        btn.textContent = '💳 Pagar con Stripe';
      }
    } catch (err) {
      alert('Error de conexión');
      btn.disabled = false;
      btn.textContent = '💳 Pagar con Stripe';
    }
  }

  // ── JUEGOS ──
  function cargarJuegos() {
    const lista = document.getElementById('lista-juegos');
    lista.innerHTML = juegos.map((j, i) => {
      const enCarrito = carrito.find(c => c.nombre === j.nombre);
      return `
        <div class="juego">
          <div class="juego-img">
            ${j.img
              ? `<img src="${j.img}" onerror="this.parentNode.innerHTML='${j.emoji || '🎮'}'"/>`
              : j.emoji || '🎮'}
          </div>
          <div class="juego-info">
            <div class="juego-nombre">${j.nombre}</div>
            <div class="juego-plataforma">${j.plataforma}</div>
            <div class="juego-precios">
              <span class="precio-original">$${j.original}</span>
              <span class="precio-nuevo">$${j.precio}</span>
              <span class="descuento">-${j.descuento}%</span>
            </div>
            <button class="btn-agregar ${enCarrito ? 'agregado' : ''}" onclick="agregarAlCarrito(${i})">
              ${enCarrito ? '✅ Agregado' : '🛒 Agregar'}
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── MODAL KEY ──
  function generarKey() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    return Array.from({length: 4}, () =>
      Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('')
    ).join('-');
  }

  function copiarKey() {
    const key = document.getElementById('modal-key').textContent;
    navigator.clipboard.writeText(key);
    document.querySelector('.btn-copiar').textContent = '✅ Copiado!';
    setTimeout(() => document.querySelector('.btn-copiar').textContent = '📋 Copiar key', 2000);
  }

  function cerrarModal() {
    document.getElementById('modal').classList.remove('abierto');
  }

  // ── AUTH ──
  function mostrarTab(tab) {
    document.getElementById('form-registro').style.display = tab === 'registro' ? 'block' : 'none';
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('activo', (tab === 'registro' && i === 0) || (tab === 'login' && i === 1));
    });
    ocultarMensaje();
  }

  function mostrarMensaje(texto, tipo) {
    const el = document.getElementById('mensaje');
    el.textContent = texto;
    el.className = 'mensaje ' + tipo;
    el.style.display = 'block';
  }

  function ocultarMensaje() {
    document.getElementById('mensaje').style.display = 'none';
  }

  async function registrar() {
    const nombre = document.getElementById('reg-nombre').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-pass').value;
    const res = await fetch('/api/auth/registro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, email, password })
    });
    const data = await res.json();
    if (res.ok) {
      mostrarMensaje('¡Cuenta creada! Ahora inicia sesión.', 'ok');
      setTimeout(() => mostrarTab('login'), 1500);
    } else {
      mostrarMensaje(data.error || data.errores?.[0]?.msg || 'Error al registrar', 'error');
    }
  }

  async function login() {
    const email = document.getElementById('log-email').value;
    const password = document.getElementById('log-pass').value;
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('token', data.token);
      document.getElementById('auth').style.display = 'none';
      document.getElementById('tienda').style.display = 'block';
      document.getElementById('nav-nombre').textContent = '👾 ' + data.nombre;
      cargarJuegos();
    } else {
      mostrarMensaje(data.error || 'Error al iniciar sesión', 'error');
    }
  }

  function cerrarSesion() {
    localStorage.removeItem('token');
    carrito = [];
    actualizarCarrito();
    document.getElementById('tienda').style.display = 'none';
    document.getElementById('auth').style.display = 'flex';
    mostrarTab('login');
  }
</script>
</body>
</html>
